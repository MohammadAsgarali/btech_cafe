<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Btech Cafe - Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff2e6; }
        
        /* FIX: Isse Pizza aur niche ke items footer se upar rahenge */
        .main-content { 
            padding-bottom: 220px !important; 
        }

        .menu-card { border: none; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .dish-img {
            height: 200px;
            object-fit: contain;
            width: 100%;
            background-color: #f8f9fa;
            padding: 10px;
        }

        @media (max-width: 600px) {
            .dish-img { height: 120px; padding: 5px; }
        }
        .price-tag { color: #E1A95F; font-weight: bold; font-size: 1.2rem; }
        .btn-add { background-color: #ffc299; border: none; font-weight: bold; }
        
        /* Payment Section Styling */
        .payment-box {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .cart-footer { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: white; 
            padding: 15px; 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            z-index: 1050; 
        }
        
        @media (min-width: 768px) {
            .cart-footer { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        .table-info { font-size: 0.8rem; color: #6c757d; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-4 main-content"> 
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Welcome, {{ name }}! ☕</h2>
            <span class="badge bg-dark">Table: {{ table_no }}</span>
        </div>
        
        <div class="row">
            {% for item in menu %}
            <div class="col-6 col-md-4">
                <div class="card menu-card">
                    <img src="{{ url_for('static', filename='images/' + item.image) }}" class="card-img-top dish-img" alt="{{ item.name }}">
                    <div class="card-body text-center p-2">
                        <h6 class="card-title mb-1">{{ item.name }}</h6>
                        <p class="price-tag mb-2">₹{{ item.price }}</p>
                        <button class="btn btn-sm btn-add w-100" onclick="addToCart('{{ item.name }}', {{ item.price }})">Add +</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="cart-footer">
        <div class="payment-box">
            <label class="small fw-bold mb-1">Payment Method:</label>
            <div class="d-flex gap-3">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment" id="cash" value="Cash" checked>
                    <label class="form-check-label small" for="cash">Cash 💵</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment" id="upi" value="UPI">
                    <label class="form-check-label small" for="upi">UPI 📱</label>
                </div>
            </div>
        </div>
        <div class="d-flex justify-content-between align-items-center w-100">
            <div>
                <p class="table-info mb-0">Ordering for Table: {{ table_no }}</p>
                <span class="text-muted">Total: </span>
                <span id="total-amount" class="h5">₹0</span>
            </div>
            <button class="btn btn-success px-4" onclick="generateBill()">Place Order</button>
        </div>
    </div>

    <script>
    let total = 0;
    let selectedItems = [];

    function addToCart(name, price) {
        total += price;
        selectedItems.push({name: name, price: price});
        document.getElementById('total-amount').innerText = "₹" + total;
    }

    function generateBill() {
        if(total === 0) {
            alert("Bhai, pehle kuch select toh kar lo!");
            return;
        }

        const paymentMode = document.querySelector('input[name="payment"]:checked').value;

        // B.Tech Logic: Send table number in JSON
        fetch("{{ url_for('place_order') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                customer: "{{ name }}",
                table: "{{ table_no }}", // Table Info added
                items: selectedItems,
                total: total,
                payment: paymentMode
            })
        })
        .then(response => response.json())
        .then(data => {
            alert("Mubarak ho! Table {{ table_no }} ka order place ho gaya.");
            window.location.href = "/"; 
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Kuch gadbad hai! Check connection.");
        });
    }
</script>
</body>
</html>
