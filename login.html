<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Btech Cafe Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F3D7AC; display: flex; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin: auto; }
        .btn-cafe { background-color: #E1A95F; color: white; font-weight: bold; transition: 0.3s; }
        .btn-cafe:hover { background-color: #c98a3f; color: white; }
        .table-badge { background: #e9ecef; color: #495057; padding: 5px 15px; border-radius: 50px; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="login-card">
            <h2 class="mb-2">☕ Btech Cafe</h2>
            
            <div class="mb-4">
                <span class="table-badge">📍 Table: {{ table_no }}</span>
            </div>
            
            <p class="text-muted mb-4">Please enter details to start ordering</p>
            
            <form action="/menu" method="POST">
                <input type="hidden" name="table_no" value="{{ table_no }}">

                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Asgar" required>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" placeholder="10 digit mobile number" pattern="[0-9]{10}" required>
                </div>

                <button type="submit" class="btn btn-cafe w-100 py-3 shadow-sm">Start Ordering 🚀</button>
            </form>
        </div>
    </div>
</body>
</html>
